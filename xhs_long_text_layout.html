<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最好用的小红书长文排版工具</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  :root {
    --bg: #f3f1ee;
    --panel: #ffffff;
    --ink: #2b2b2b;
    --muted: #8b8b8b;
    --line: #e9e4df;
    --accent: #ff2442;
    --accent-ink: #ffffff;
    --chip: #f4efe9;
    --shadow: 0 10px 30px rgba(20, 16, 12, 0.08);
    --toolbar-h: 56px;
  }
  body {
    font-family: "Avenir Next", "PingFang SC", "Source Han Sans SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(1200px 800px at 10% 0%, #f8f5f1 0%, #f3f1ee 40%, #efebe6 100%);
    height: 100vh; display: flex; flex-direction: column; color: var(--ink);
    overflow: hidden;
  }

  .toolbar {
    background: linear-gradient(90deg, #ffffff 0%, #fbf7f2 100%);
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 6px 16px rgba(30, 20, 10, 0.06);
    min-height: var(--toolbar-h);
    position: relative;
  }
  .toolbar h1 {
    font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: 0.2px;
    position: absolute; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }
  .toolbar .hint { font-size: 11px; color: var(--muted); background: var(--chip); padding: 4px 8px; border-radius: 999px; }

  .main {
    display: grid;
    grid-template-columns: 332px minmax(420px, 1fr) 312px;
    flex: 1;
    overflow: hidden;
    gap: 10px;
    padding: 10px;
    min-height: 0;
    height: 100%;
    align-items: stretch;
  }

  /* 左侧 */
  .left-panel {
    height: 100%;
    min-height: 0;
    width: 100%; min-width: 0; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: var(--shadow);
    padding: 8px; gap: 8px;
  }
  .left-panel h2 {
    font-size: 14px; font-weight: 800; color: #303030;
    padding: 8px 10px 6px; border-bottom: 1px solid var(--line);
    letter-spacing: 0.6px;
  }
  .middle-panel {
    height: 100%;
    min-height: 0;
    background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
    padding: 0;
    overflow: hidden;
  }
  .middle-panel h2 {
    font-size: 15px; font-weight: 800; color: #303030;
    padding: 10px 12px 8px; border-bottom: 1px solid var(--line);
    letter-spacing: 0.6px;
  }
  .middle-scroll {
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: scroll; overflow-x: hidden;
    min-height: 0; flex: 1;
    scrollbar-gutter: stable both-edges;
    overscroll-behavior: contain;
    padding: 8px;
  }



  .editor-area { flex: 1; min-height: 200px; display: flex; flex-direction: column; background: #fffdf9; border: 1px solid #f0e8df; border-radius: 12px; overflow: hidden; }
  .editor-area textarea {
    flex: 1; border: none; outline: none; resize: none; padding: 14px;
    min-height: 0; overflow: auto;
    font-size: 12px; line-height: 1.5; font-family: "SF Mono", "Fira Code", Menlo, monospace;
    color: #2f2f2f; background: #fbfaf8;
  }
  .drop-hint {
    padding: 8px 12px; font-size: 11px; color: var(--muted);
    background: #f7f4f1; text-align: center; border-top: 1px dashed var(--line);
  }
  .drop-hint.dragover { background: #fff3f5; color: var(--accent); border-color: var(--accent); }

  /* 模板切换 */
  .template-panel { border: 1px solid #efe4d8; background: #f7f1ea; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; flex: 0 0 auto; }
  .template-header { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px 10px 6px; border-bottom: 1px solid var(--line); }
  .template-panel h2 { font-size: 14px; font-weight: 800; color: #303030; }
  .template-actions { display: flex; gap: 6px; }
  .template-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 8px 10px 6px; }
  .template-btn {
    border: 1px solid var(--line); background: #fbfaf8; color: #3a3a3a;
    padding: 7px 6px; border-radius: 9px; cursor: pointer; font-size: 11px; font-weight: 700; line-height: 1.1;
    transition: all .18s ease;
  }
  .template-btn:hover { background: #f6f1ec; }
  .template-btn.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); box-shadow: 0 6px 16px rgba(255, 36, 66, 0.18); }
  .template-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px 10px 10px; }
  .template-field { display: flex; flex-direction: column; gap: 6px; }
  .template-field.full-row { grid-column: 1 / -1; }
  .template-field.twitter-only { display: none; }
  .template-field label { font-size: 10px; color: #777; }
  .template-field input {
    padding: 5px 7px; border: 1px solid var(--line); border-radius: 9px; font-size: 11px;
    background: #fff; color: #2f2f2f;
  }
  .avatar-row { display: flex; align-items: center; gap: 8px; }
  .avatar-preview {
    width: 46px; height: 46px; border-radius: 50%; object-fit: cover;
    border: 1px solid var(--line); background: #dde5ee; flex: 0 0 46px;
  }
  .avatar-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; min-width: 0; }
  .avatar-pick-btn {
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    color: #444;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .avatar-pick-btn:hover { background: #f6f1ec; }
  .avatar-file {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }
  .avatar-status {
    font-size: 10px;
    color: #8a817a;
    line-height: 1.2;
    word-break: break-all;
    max-width: 220px;
  }

  /* 样式面板 */
  .style-panel { border: 1px solid #efe4d8; background: #f5eee6; border-radius: 12px; overflow: hidden; flex: 0 0 auto; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  .panel-header h2 { font-size: 14px; font-weight: 800; color: #303030; letter-spacing: 0.5px; }
  .ghost-btn { border: 1px solid var(--line); background: #fff; color: #444; padding: 5px 8px; font-size: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; }
  .ghost-btn:hover { background: #f6f1ec; }
  .style-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
  .style-item { padding: 6px 10px; display: flex; align-items: center; justify-content: space-between; gap: 6px; border-bottom: 1px solid #f2eee9; }
  .style-item label { font-size: 10px; color: #7a7a7a; white-space: nowrap; }
  .style-item input[type="range"] { width: 126px; accent-color: var(--accent); }
  .style-item input[type="color"] { width: 26px; height: 20px; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; padding: 0; }
  .style-item .val { font-size: 10px; color: #9a9a9a; width: 34px; text-align: right; flex: 0 0 34px; }

  /* 右侧预览 */
  .right-panel {
    height: 100%;
    min-height: 0;
    flex: 1; overflow: auto; padding: 10px;
    background: linear-gradient(180deg, #efebe6 0%, #e9e4df 100%);
    border-radius: 14px; border: 1px solid var(--line); box-shadow: var(--shadow);
  }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .section-header h2 { font-size: 14px; font-weight: 800; color: #3a3a3a; letter-spacing: 0.5px; }
  .section-header button {
    padding: 6px 12px; font-size: 11px; border: none; border-radius: 10px; cursor: pointer;
    background: var(--accent); color: #fff; font-weight: 700; letter-spacing: 0.3px;
    transition: transform .15s ease, box-shadow .15s ease, background .2s;
    box-shadow: 0 8px 18px rgba(255, 36, 66, 0.25);
  }
  .section-header button:hover { background: #e0203a; transform: translateY(-1px); }
  .section-header button:disabled { background: #cfc6be; cursor: not-allowed; box-shadow: none; }

  .preview-pages { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .page-wrapper { background: #fff; box-shadow: 0 12px 24px rgba(30, 20, 10, 0.15); border-radius: 12px; overflow: visible; position: relative; border: 1px solid #f2ede7; }
  .page-wrapper .page-label { position: absolute; top: 8px; right: 10px; font-size: 11px; color: #fff; background: rgba(34, 34, 34, 0.55); padding: 4px 8px; border-radius: 999px; z-index: 2; }

  @media (max-height: 940px) {
    body { overflow: auto; }
    .main { height: auto; overflow: visible; }
    .middle-panel { overflow: auto; }
    .right-panel { overflow: auto; }
  }

  @media (max-width: 980px) {
    .main { grid-template-columns: 1fr; }
    .right-panel { grid-column: auto; }
  }


</style>
</head>
<body>

<div class="toolbar">
  <h1>最好用的小红书长文排版工具</h1>
  <span class="hint">输入 Markdown 或拖拽 .md 文件，实时预览，下载图片</span>
</div>

<div class="main">
  <!-- 左侧 -->
  <div class="left-panel">
    <h2>✏️ 编辑区</h2>
    <div class="editor-area">
      <textarea id="editor" placeholder="在此输入 Markdown 内容...&#10;&#10;# 标题（第一个一级标题单独成封面页）&#10;## 二级标题&#10;正文内容&#10;- 列表&#10;**加粗** *斜体* `代码`&#10;> 引用&#10;--- 分隔线"></textarea>
      <div class="drop-hint" id="dropHint">拖拽 .md 文件和图片到此处（支持同时拖入多个文件）</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="section-header">
      <h2>封面页</h2>
      <button id="btnDownloadTitle" onclick="downloadTitle()" disabled>下载封面图</button>
    </div>
    <div class="preview-pages" id="titlePreview"></div>

    <div class="section-header">
      <h2>正文页</h2>
      <button id="btnDownloadAll" onclick="downloadAll()" disabled>下载全部图片</button>
    </div>
    <div class="preview-pages" id="contentPreview"></div>
  </div>

  <!-- 右侧 -->
  <div class="middle-panel">
    <div class="middle-scroll">
      <div class="template-panel">
      <div class="template-header">
        <h2>模板切换</h2>
        <div class="template-actions">
          <button id="btnResetTemplate" class="ghost-btn" type="button">重置模板</button>
          <button id="btnExportConfig" class="ghost-btn" type="button">导出配置</button>
        </div>
      </div>
      <div class="template-buttons" id="templateButtons"></div>
      <div class="template-fields">
        <div class="template-field">
          <label>作者名（长文样式）</label>
          <input id="authorNameInput" type="text" placeholder="你的名字">
        </div>
        <div class="template-field">
          <label>账号（长文样式）</label>
          <input id="authorHandleInput" type="text" placeholder="@yourhandle">
        </div>
      <div class="template-field full-row twitter-only" data-twitter-only>
          <label>头像（长文样式）</label>
          <div class="avatar-row">
            <img id="authorAvatarPreview" class="avatar-preview" alt="头像预览">
            <div class="avatar-actions">
              <button id="btnPickAvatar" class="avatar-pick-btn" type="button">选择图片</button>
              <input id="authorAvatarFileInput" class="avatar-file" type="file" accept="image/*">
              <button id="btnClearAvatar" class="ghost-btn" type="button">清空头像</button>
              <div id="authorAvatarStatus" class="avatar-status">未选择头像</div>
            </div>
          </div>
        </div>
      </div>
    </div>

        <div class="style-panel">
        <div class="panel-header">
          <h2>样式设置</h2>
          <button id="btnResetStyle" class="ghost-btn" type="button">恢复默认值</button>
        </div>
        <div class="style-grid" id="styleGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- 隐藏渲染区 -->
<div id="renderArea" style="position:fixed;left:-9999px;top:0;z-index:-1;"></div>

<script>
const XHS_WIDTH = 1080;
const XHS_HEIGHT = 1440;
const PREVIEW_SCALE = 0.3;
const DEFAULT_TWITTER_AVATAR = (() => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
    <rect width="144" height="144" fill="#dbe7f4"/>
    <circle cx="72" cy="56" r="28" fill="#9bb5d1"/>
    <rect x="28" y="94" width="88" height="42" rx="21" fill="#9bb5d1"/>
  </svg>`;
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
})();

// 默认样式配置
const defaultStyle = {
  backgroundColor: '#F5F4EF',
  bodyFontSize: 42,
  lineHeight: 1.4,
  paragraphGap: 10,
  textColor: '#33312E',
  strongColor: '#2B6CB0',
  titleFontSize: 96,
  subheadingFontSize: 48,
  paddingVertical: 80,
  paddingHorizontal: 60,
  borderColor: '#2B6CB0',
  titleMode: 'cover',
  authorName: '你的名字',
  authorHandle: '@yourhandle',
  authorAvatar: '',
};

// 当前样式（可修改）
const style = { ...defaultStyle };

// 样式控件定义
const controls = [
  { key: 'backgroundColor', label: '背景色', type: 'color' },
  { key: 'textColor',       label: '正文颜色', type: 'color' },
  { key: 'strongColor',     label: '加粗颜色', type: 'color' },
  { key: 'borderColor',     label: '强调色', type: 'color' },
  { key: 'titleFontSize',   label: '标题字体', type: 'range', min: 54, max: 180, step: 2 },
  { key: 'subheadingFontSize', label: '小标字体', type: 'range', min: 24, max: 96, step: 2 },
  { key: 'bodyFontSize',    label: '文章字体', type: 'range', min: 22, max: 72, step: 1 },
  { key: 'lineHeight',      label: '行距', type: 'range', min: 1.2, max: 2.0, step: 0.1 },
  { key: 'paragraphGap',    label: '段间距', type: 'range', min: 6, max: 36, step: 2 },
  { key: 'paddingVertical',  label: '上下边距', type: 'range', min: 40, max: 200, step: 10 },
  { key: 'paddingHorizontal',label: '左右边距', type: 'range', min: 30, max: 120, step: 5 },
];

// 初始化样式面板

function syncStylePanel() {
  const inputs = document.querySelectorAll('#styleGrid [data-key]');
  inputs.forEach(el => {
    const key = el.dataset.key;
    if (!(key in style)) return;
    el.value = style[key];
    if (el.type === 'range') {
      const span = el.parentElement.querySelector('.val');
      if (span) span.textContent = style[key];
    }
  });
}

function syncTemplateInputs() {
  const nameInput = document.getElementById('authorNameInput');
  const handleInput = document.getElementById('authorHandleInput');
  const avatarPreview = document.getElementById('authorAvatarPreview');
  const avatarInput = document.getElementById('authorAvatarFileInput');
  const avatarStatus = document.getElementById('authorAvatarStatus');
  if (nameInput) nameInput.value = style.authorName || '';
  if (handleInput) handleInput.value = style.authorHandle || '';
  if (avatarInput) avatarInput.value = '';
  if (avatarPreview) avatarPreview.src = style.authorAvatar || DEFAULT_TWITTER_AVATAR;
  if (avatarStatus) avatarStatus.textContent = style.authorAvatar ? '已上传头像' : '未选择头像';
}

function resetToDefault() {
  Object.keys(defaultStyle).forEach(k => { style[k] = defaultStyle[k]; });
  syncStylePanel();
  syncTemplateInputs();
  updateTemplateButtons();
  scheduleUpdate();
}

function resetTemplateConfig() {
  style.titleMode = defaultStyle.titleMode;
  style.authorName = defaultStyle.authorName;
  style.authorHandle = defaultStyle.authorHandle;
  style.authorAvatar = defaultStyle.authorAvatar;
  syncTemplateInputs();
  updateTemplateButtons();
  scheduleUpdate();
}

function exportConfig() {
  const payload = {
    exportedAt: new Date().toISOString(),
    style: { ...style },
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.download = 'xhs-layout-config.json';
  link.click();
  URL.revokeObjectURL(url);
}

function waitForImageLoad(img) {
  if (!img || !img.src) return Promise.resolve();
  if (img.complete && img.naturalWidth > 0) return Promise.resolve();
  return new Promise(resolve => {
    const done = () => {
      img.removeEventListener('load', done);
      img.removeEventListener('error', done);
      resolve();
    };
    img.addEventListener('load', done, { once: true });
    img.addEventListener('error', done, { once: true });
  });
}

async function waitForImages(root) {
  const imgs = Array.from(root.querySelectorAll('img'));
  await Promise.all(imgs.map(waitForImageLoad));
}

async function canvasToBlob(canvas) {
  return await new Promise((resolve, reject) => {
    if (!canvas.toBlob) {
      try {
        const dataUrl = canvas.toDataURL('image/png');
        resolve(dataURLToBlob(dataUrl));
      } catch (err) {
        reject(err);
      }
      return;
    }
    canvas.toBlob(blob => {
      if (blob) resolve(blob);
      else reject(new Error('Failed to create image blob'));
    }, 'image/png');
  });
}

function dataURLToBlob(dataURL) {
  const [meta, data] = dataURL.split(',');
  const mimeMatch = meta.match(/data:([^;]+)/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/png';
  const binary = atob(data);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

function triggerBlobDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  setTimeout(() => {
    URL.revokeObjectURL(url);
    link.remove();
  }, 1000);
}

function createCaptureClone(el) {
  const host = document.createElement('div');
  host.style.position = 'fixed';
  host.style.left = '-20000px';
  host.style.top = '0';
  host.style.width = XHS_WIDTH + 'px';
  host.style.height = XHS_HEIGHT + 'px';
  host.style.overflow = 'hidden';
  host.style.background = 'transparent';
  host.style.pointerEvents = 'none';
  host.style.zIndex = '-1';
  const clone = el.cloneNode(true);
  host.appendChild(clone);
  document.body.appendChild(host);
  return { host, clone };
}

async function inlineCaptureImages(root) {
  const imgs = Array.from(root.querySelectorAll('img'));
  await Promise.all(imgs.map(async img => {
    const src = img.currentSrc || img.src || '';
    if (!src || src.startsWith('data:')) return;
    try {
      const response = await fetch(src, { mode: 'cors', credentials: 'omit' });
      if (!response.ok) return;
      const blob = await response.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      if (dataUrl) img.src = dataUrl;
    } catch (err) {
      const altText = (img.alt || 'image').replace(/[<>&"]/g, '');
      const placeholder = `<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
        <rect width="240" height="160" rx="18" fill="#E8E1D6"/>
        <rect x="18" y="18" width="204" height="124" rx="14" fill="#F5EFE7" stroke="#D7CBBE" stroke-width="2" stroke-dasharray="8 8"/>
        <text x="120" y="82" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#8C8477">${altText || 'image'}</text>
      </svg>`;
      img.src = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(placeholder)}`;
    }
  }));
}

async function prepareCaptureElement(el) {
  const { host, clone } = createCaptureClone(el);
  try {
    await waitForImages(clone);
    await inlineCaptureImages(clone);
    await waitForImages(clone);
    return { host, clone };
  } catch (err) {
    host.remove();
    throw err;
  }
}

function initStylePanel() {
  const grid = document.getElementById('styleGrid');
  controls.forEach(c => {
    const div = document.createElement('div');
    div.className = 'style-item';
    if (c.type === 'color') {
      div.innerHTML = `<label>${c.label}</label><input type="color" value="${style[c.key]}" data-key="${c.key}">`;
      div.querySelector('input').addEventListener('input', e => { style[c.key] = e.target.value; scheduleUpdate(); });
    } else if (c.type === 'select') {
      const options = c.options.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
      div.innerHTML = `<label>${c.label}</label><select data-key="${c.key}">${options}</select>`;
      const sel = div.querySelector('select');
      sel.value = style[c.key];
      sel.addEventListener('change', e => { style[c.key] = e.target.value; scheduleUpdate(); });
    } else {
      const val = style[c.key];
      div.innerHTML = `<label>${c.label}</label><input type="range" min="${c.min}" max="${c.max}" step="${c.step}" value="${val}" data-key="${c.key}"><span class="val">${val}</span>`;
      const inp = div.querySelector('input');
      const span = div.querySelector('.val');
      inp.addEventListener('input', e => { style[c.key] = parseFloat(e.target.value); span.textContent = e.target.value; scheduleUpdate(); });
    }
    grid.appendChild(div);
  });
}

function initTemplatePanel() {
  const modes = [
    { value: 'cover', label: '封面页' },
    { value: 'inline', label: '内嵌标题' },
    { value: 'twitter', label: '长文样式' },
  ];
  const wrap = document.getElementById('templateButtons');
  wrap.innerHTML = '';
  modes.forEach(m => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'template-btn' + (style.titleMode === m.value ? ' active' : '');
    btn.dataset.mode = m.value;
    btn.textContent = m.label;
    btn.addEventListener('click', () => {
      style.titleMode = m.value;
      updateTemplateButtons();
      scheduleUpdate();
    });
    wrap.appendChild(btn);
  });

  const nameInput = document.getElementById('authorNameInput');
  const handleInput = document.getElementById('authorHandleInput');
  const avatarInput = document.getElementById('authorAvatarFileInput');
  const avatarPickBtn = document.getElementById('btnPickAvatar');
  const clearAvatarBtn = document.getElementById('btnClearAvatar');
  nameInput.value = style.authorName || '';
  handleInput.value = style.authorHandle || '';
  const avatarPreview = document.getElementById('authorAvatarPreview');
  if (avatarPreview) avatarPreview.src = style.authorAvatar || DEFAULT_TWITTER_AVATAR;
  const avatarStatus = document.getElementById('authorAvatarStatus');
  if (avatarStatus) avatarStatus.textContent = style.authorAvatar ? '已上传头像' : '未选择头像';
  nameInput.addEventListener('input', e => { style.authorName = e.target.value; scheduleUpdate(); });
  handleInput.addEventListener('input', e => { style.authorHandle = e.target.value; scheduleUpdate(); });
  if (avatarPickBtn && avatarInput) {
    avatarPickBtn.addEventListener('click', () => avatarInput.click());
  }
  if (avatarInput) {
    avatarInput.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        style.authorAvatar = String(ev.target.result || '');
        syncTemplateInputs();
        scheduleUpdate();
      };
      reader.readAsDataURL(file);
    });
  }
  if (clearAvatarBtn) {
    clearAvatarBtn.addEventListener('click', () => {
      style.authorAvatar = '';
      syncTemplateInputs();
      scheduleUpdate();
    });
  }
  updateTemplateFieldVisibility();
}

function updateTemplateButtons() {
  const btns = document.querySelectorAll('.template-btn');
  btns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === style.titleMode);
  });
  updateTemplateFieldVisibility();
}

function updateTemplateFieldVisibility() {
  const twitterOnlyFields = document.querySelectorAll('[data-twitter-only]');
  const showTwitterFields = style.titleMode === 'twitter';
  twitterOnlyFields.forEach(el => {
    el.style.display = showTwitterFields ? 'flex' : 'none';
  });
  const avatarPreview = document.getElementById('authorAvatarPreview');
  if (avatarPreview) avatarPreview.src = style.authorAvatar || DEFAULT_TWITTER_AVATAR;
}

// Markdown 解析（移植自 xhs_formatter.js）
function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
function renderInlineImage(alt, rawUrl) {
  const cleaned = stripMarkdownImageTitle(String(rawUrl || '').replace(/&amp;/g, '&'));
  const src = resolveImageSource(cleaned);
  if (!src) {
    return escapeHtml(`![${alt}](${cleaned})`);
  }
  return `<img class="inline-markdown-image" src="${escapeAttr(src)}" alt="${escapeAttr(alt)}">`;
}
function inlineFormat(text) {
  return escapeHtml(text)
    .replace(/!\[([^\]]*)\]\((.+?)\)/g, (_, alt, rawUrl) => renderInlineImage(alt, rawUrl))
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}
function isRenderableUrl(url) {
  return /^(https?:)?\/\/.+/i.test(url) || /^data:image\//i.test(url);
}
const LOCAL_IMAGE_ROOT = '/Users/xiaofang/Documents/Obsidian/系统设置/attachments';
function normalizeImageKey(raw) {
  if (!raw) return '';
  let value = String(raw);
  try {
    value = decodeURIComponent(value);
  } catch (err) {
    // 保留原始值，避免单个坏编码阻断整页渲染
  }
  return value
    .replace(/^file:\/\//, '')
    .split('?')[0]
    .split('#')[0]
    .trim()
    .split('/')
    .pop();
}
function stripMarkdownImageTitle(raw) {
  const value = String(raw || '').trim();
  const match = value.match(/^(.+?)(?:\s+"[^"]*")?$/);
  return match ? match[1].trim() : value;
}
function resolveLocalImagePath(rawUrl) {
  if (!rawUrl) return null;
  const cleaned = stripMarkdownImageTitle(rawUrl);
  const toFileUrl = (path) => encodeURI(`file://${path}`);
  if (cleaned.startsWith('file://')) {
    return encodeURI(cleaned);
  }
  if (cleaned.startsWith('/Users/')) {
    return toFileUrl(cleaned);
  }
  // 相对路径或纯文件名，拼到本地附件目录
  if (!/^[a-zA-Z]+:\/\//.test(cleaned)) {
    const localPath = cleaned.replace(/^\.?\//, '');
    return toFileUrl(`${LOCAL_IMAGE_ROOT.replace(/\/$/, '')}/${localPath}`);
  }
  return null;
}
function estimateWordCount(text) {
  const cleaned = text
    .replace(/^---[\\s\\S]*?---/g, '')
    .replace(/!\\[[^\\]]*\\]\\([^)]*\\)/g, '')
    .replace(/!\\[\\[[^\\]]+\\]\\]/g, '')
    .replace(/[`*_>#\\-]/g, ' ')
    .replace(/\\s+/g, ' ');
  const cn = (cleaned.match(/[\\u4e00-\\u9fa5]/g) || []).length;
  const en = (cleaned.match(/[A-Za-z0-9]+/g) || []).length;
  return cn + en;
}

// 图片存储（filename -> dataURL）
const imageStore = {};
function resolveImageSource(rawUrl) {
  if (!rawUrl) return null;
  const cleaned = stripMarkdownImageTitle(rawUrl);
  const key = normalizeImageKey(cleaned);
  const direct = imageStore[cleaned] || imageStore[key] || imageStore[normalizeImageKey(decodeURIComponent(cleaned))];
  if (direct) return direct;
  if (isRenderableUrl(cleaned)) return cleaned;
  return resolveLocalImagePath(cleaned);
}

function parseMarkdown(text) {
  // 去除 BOM
  text = text.replace(/^\uFEFF/, '');
  // 去除 YAML frontmatter（--- ... ---）
  text = text.replace(/^---\n[\s\S]*?\n---\n?/, '');

  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let firstH1 = true;
  let titleHtml = '';
  let firstParagraph = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].replace(/\r$/, '');
    const trimmed = line.trimStart();

    // 标准 Markdown 图片 ![alt](path)
    const mdImgMatch = trimmed.match(/^!\[([^\]]*)\]\((.+?)\)$/);
    // Obsidian 图片 ![[filename]]
    const obsImgMatch = trimmed.match(/^!\[\[(.+?)\]\]$/);

    if (mdImgMatch) {
      if (inList) { html += '</ul>'; inList = false; }
      const rawUrl = stripMarkdownImageTitle(mdImgMatch[2].trim());
      const src = resolveImageSource(rawUrl);
      if (src) {
        html += `<div class="image-container"><img src="${src}" alt="${escapeHtml(mdImgMatch[1])}"></div>`;
      }
      // 无图片时静默跳过，不显示占位
    } else if (obsImgMatch) {
      if (inList) { html += '</ul>'; inList = false; }
      const rawName = stripMarkdownImageTitle(obsImgMatch[1]);
      const imgName = normalizeImageKey(rawName);
      const localResolved = resolveLocalImagePath(rawName);
      const src = imageStore[rawName] || imageStore[imgName] || localResolved;
      if (src) {
        html += `<div class="image-container"><img src="${src}" alt=""></div>`;
      }
    } else if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      const t = escapeHtml(trimmed.slice(2));
      if (firstH1) {
        titleHtml = t;
        firstH1 = false;
      } else {
        html += `<h1>${t}</h1>`;
      }
    } else if (trimmed.startsWith('### ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${escapeHtml(trimmed.slice(4))}</h3>`;
    } else if (trimmed.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2>${escapeHtml(trimmed.slice(3))}</h2>`;
    } else if (trimmed.startsWith('- ') || trimmed.startsWith('• ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inlineFormat(trimmed.slice(2))}</li>`;
    } else if (/^\d+\.\s/.test(trimmed)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<li class="numbered">${inlineFormat(trimmed.replace(/^\d+\.\s/, ''))}</li>`;
    } else if (trimmed === '---' || trimmed === '===') {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<hr>';
    } else if (trimmed.startsWith('> ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<blockquote>${inlineFormat(trimmed.slice(2))}</blockquote>`;
    } else if (trimmed === '') {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<br>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      // 检测独立的加粗行作为小标题（如 **第三步：xxx**）
      const boldLineMatch = trimmed.match(/^\*\*(.+)\*\*$/);
      if (boldLineMatch) {
        html += `<h3>${escapeHtml(boldLineMatch[1])}</h3>`;
      } else {
        if (!firstParagraph && trimmed) {
          firstParagraph = escapeHtml(trimmed);
        }
        html += `<p>${inlineFormat(trimmed)}</p>`;
      }
    }
  }
  if (inList) html += '</ul>';

  // 如果没有 # 标题，用第一段文字作为封面标题
  if (!titleHtml && firstParagraph) {
    titleHtml = firstParagraph;
    html = html.replace(`<p>${firstParagraph}</p>`, '');
  }

  return { titleHtml, bodyHtml: html };
}

// 防截断：将跨页元素推到下一页，并在每页上下留出边距
function preventTruncation(container) {
  const padV = style.paddingVertical;
  const blocks = container.querySelectorAll('p, h1, h2, h3, li, blockquote, hr');
  for (const block of blocks) {
    block.style.marginTop = '';
  }
  for (const block of blocks) {
    const rect = block.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();
    const top = rect.top - containerRect.top;
    const bottom = rect.bottom - containerRect.top;
    const pageIndex = Math.floor(top / XHS_HEIGHT);
    const pageStart = pageIndex * XHS_HEIGHT;
    const pageEnd = pageStart + XHS_HEIGHT;
    // 每页的安全内容区域：上下各留 padV 的边距（第一页已有 CSS padding，跳过）
    const safeTop = pageIndex === 0 ? pageStart : pageStart + padV;
    const safeBottom = pageEnd - padV;

    // 元素底部超出安全区域底部，推到下一页的安全区域顶部
    if (bottom > safeBottom && top > safeTop + 20) {
      const nextSafeTop = pageEnd + padV;
      const pushDown = nextSafeTop - top;
      block.style.marginTop = (parseFloat(getComputedStyle(block).marginTop) + pushDown) + 'px';
    }
    // 元素顶部在页面顶部的不安全区域内（非首页），推到安全区域
    else if (pageIndex > 0 && top < safeTop && top > pageStart) {
      const pushDown = safeTop - top;
      block.style.marginTop = (parseFloat(getComputedStyle(block).marginTop) + pushDown) + 'px';
    }
  }
}

// 渲染并分页
let titlePageEl = null;
let contentPageEls = [];

function renderPreview() {
  const text = document.getElementById('editor').value;
  if (!text.trim()) {
    document.getElementById('titlePreview').innerHTML = '<p style="color:#aaa;font-size:14px;">输入内容后显示封面预览</p>';
    document.getElementById('contentPreview').innerHTML = '<p style="color:#aaa;font-size:14px;">输入内容后显示正文预览</p>';
    document.getElementById('btnDownloadTitle').disabled = true;
    document.getElementById('btnDownloadAll').disabled = true;
    titlePageEl = null;
    contentPageEls = [];
    return;
  }

  const { titleHtml, bodyHtml } = parseMarkdown(text);
  const css = buildPageCSS();
  const renderArea = document.getElementById('renderArea');
  renderArea.innerHTML = '';

  // 封面页
  titlePageEl = null;
  const titlePreview = document.getElementById('titlePreview');
  titlePreview.innerHTML = '';

  if (titleHtml && style.titleMode === 'cover') {
    const titleDiv = document.createElement('div');
    titleDiv.innerHTML = `<style>${css}</style><div class="title-page"><h1 class="main-title">${titleHtml}</h1></div>`;
    renderArea.appendChild(titleDiv);
    titlePageEl = titleDiv.querySelector('.title-page');

    // 缩略预览
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.style.width = (XHS_WIDTH * PREVIEW_SCALE) + 'px';
    wrapper.style.height = (XHS_HEIGHT * PREVIEW_SCALE) + 'px';
    wrapper.innerHTML = `<span class="page-label">封面</span>`;
    const inner = document.createElement('div');
    inner.style.cssText = `width:${XHS_WIDTH}px;height:${XHS_HEIGHT}px;transform:scale(${PREVIEW_SCALE});transform-origin:top left;pointer-events:none;`;
    const clone = titleDiv.cloneNode(true);
    inner.appendChild(clone);
    wrapper.appendChild(inner);
    titlePreview.appendChild(wrapper);
    document.getElementById('btnDownloadTitle').disabled = false;
  } else if (style.titleMode === 'inline' || style.titleMode === 'twitter') {
    titlePreview.innerHTML = '<p style="color:#aaa;font-size:14px;">标题与正文合并展示</p>';
    document.getElementById('btnDownloadTitle').disabled = true;
  } else {
    titlePreview.innerHTML = '<p style="color:#aaa;font-size:14px;">无封面（添加 # 标题 生成封面）</p>';
    document.getElementById('btnDownloadTitle').disabled = true;
  }

  // 正文页
  contentPageEls = [];
  const contentPreview = document.getElementById('contentPreview');
  contentPreview.innerHTML = '';

  let finalBodyHtml = bodyHtml;
  if (style.titleMode === 'inline' && titleHtml) {
    const words = estimateWordCount(text);
    const minutes = Math.max(1, Math.ceil(words / 400));
    const meta = `全文${words}字｜阅读需${minutes}分钟`;
    const titleBlock = `
      <div class="inline-title-block">
        <div class="inline-meta">${meta}</div>
        <div class="inline-hr"></div>
        <h1 class="inline-title">${titleHtml}</h1>
        <div class="inline-title-underline"></div>
      </div>
    `;
    finalBodyHtml = titleBlock + finalBodyHtml;
  } else if (style.titleMode === 'twitter') {
    const name = escapeHtml(style.authorName || '你的名字');
    const handle = escapeHtml(style.authorHandle || '@yourhandle');
    const avatarSrc = style.authorAvatar || DEFAULT_TWITTER_AVATAR;
    const twitterBlock = `
      <div class="twitter-header">
        <div class="twitter-profile">
          <img class="twitter-avatar" src="${avatarSrc}" alt="avatar">
          <div class="twitter-meta">
            <div class="twitter-name-row">
              <span class="twitter-name">${name}</span>
              <span class="twitter-badge">✓</span>
            </div>
            <div class="twitter-handle">${handle}</div>
          </div>
        </div>
        <div class="twitter-divider"></div>
      </div>
    `;
    finalBodyHtml = twitterBlock + finalBodyHtml;
  }

  if (!finalBodyHtml.trim() || finalBodyHtml.replace(/<br>/g, '').trim() === '') {
    contentPreview.innerHTML = '<p style="color:#aaa;font-size:14px;">无正文内容</p>';
    document.getElementById('btnDownloadAll').disabled = true;
    return;
  }

  const bodyDiv = document.createElement('div');
  bodyDiv.innerHTML = `<style>${css}</style><div class="xhs-page">${finalBodyHtml}</div>`;
  renderArea.appendChild(bodyDiv);

  const pageEl = bodyDiv.querySelector('.xhs-page');

  // 防截断
  preventTruncation(pageEl);
  // 二次防截断
  preventTruncation(pageEl);

  const totalH = pageEl.scrollHeight;
  const pages = Math.max(1, Math.ceil(totalH / XHS_HEIGHT));
  pageEl.style.minHeight = (pages * XHS_HEIGHT) + 'px';

  // 生成预览缩略图 + 记录每页元素
  for (let i = 0; i < pages; i++) {
    // 创建单页裁剪容器
    const clipDiv = document.createElement('div');
    clipDiv.style.cssText = `width:${XHS_WIDTH}px;height:${XHS_HEIGHT}px;overflow:hidden;position:relative;`;
    const innerClone = bodyDiv.cloneNode(true);
    const innerPage = innerClone.querySelector('.xhs-page');
    innerPage.style.marginTop = (-i * XHS_HEIGHT) + 'px';
    clipDiv.appendChild(innerClone);
    renderArea.appendChild(clipDiv);
    contentPageEls.push(clipDiv);

    // 缩略预览
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.style.width = (XHS_WIDTH * PREVIEW_SCALE) + 'px';
    wrapper.style.height = (XHS_HEIGHT * PREVIEW_SCALE) + 'px';
    wrapper.innerHTML = `<span class="page-label">第 ${i + 1} 页</span>`;
    const previewInner = document.createElement('div');
    previewInner.style.cssText = `width:${XHS_WIDTH}px;height:${XHS_HEIGHT}px;transform:scale(${PREVIEW_SCALE});transform-origin:top left;pointer-events:none;overflow:hidden;position:relative;`;
    const previewClone = bodyDiv.cloneNode(true);
    const previewPage = previewClone.querySelector('.xhs-page');
    previewPage.style.marginTop = (-i * XHS_HEIGHT) + 'px';
    previewInner.appendChild(previewClone);
    wrapper.appendChild(previewInner);
    contentPreview.appendChild(wrapper);
  }

  document.getElementById('btnDownloadAll').disabled = false;
}

// 下载辅助
async function captureElement(el, filename) {
  const { host, clone } = await prepareCaptureElement(el);
  try {
    const canvas = await html2canvas(clone, {
      width: XHS_WIDTH,
      height: XHS_HEIGHT,
      scale: Math.max(2, window.devicePixelRatio || 1),
      useCORS: true,
      allowTaint: false,
      backgroundColor: null,
      imageTimeout: 15000,
    });
    const blob = await canvasToBlob(canvas);
    triggerBlobDownload(blob, filename);
  } finally {
    host.remove();
  }
}

async function downloadTitle() {
  if (!titlePageEl) return;
  const btn = document.getElementById('btnDownloadTitle');
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    await captureElement(titlePageEl, '封面.png');
  } finally {
    btn.disabled = false; btn.textContent = '下载封面图';
  }
}

async function downloadAll() {
  if (contentPageEls.length === 0) return;
  const btn = document.getElementById('btnDownloadAll');
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    if (window.JSZip) {
      const zip = new JSZip();
      let fileIndex = 1;
      if (titlePageEl) {
        const preparedTitle = await prepareCaptureElement(titlePageEl);
        try {
          const titleCanvas = await html2canvas(preparedTitle.clone, {
            width: XHS_WIDTH,
            height: XHS_HEIGHT,
            scale: Math.max(2, window.devicePixelRatio || 1),
            useCORS: true,
            allowTaint: false,
            backgroundColor: null,
            imageTimeout: 15000,
          });
          zip.file('01-封面.png', await canvasToBlob(titleCanvas));
        } finally {
          preparedTitle.host.remove();
        }
        fileIndex = 2;
      }
      for (let i = 0; i < contentPageEls.length; i++) {
        const preparedPage = await prepareCaptureElement(contentPageEls[i]);
        try {
          const canvas = await html2canvas(preparedPage.clone, {
            width: XHS_WIDTH,
            height: XHS_HEIGHT,
            scale: Math.max(2, window.devicePixelRatio || 1),
            useCORS: true,
            allowTaint: false,
            backgroundColor: null,
            imageTimeout: 15000,
          });
          const idx = String(i + fileIndex).padStart(2, '0');
          zip.file(`${idx}.png`, await canvasToBlob(canvas));
        } finally {
          preparedPage.host.remove();
        }
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      triggerBlobDownload(blob, 'xhs-layout-images.zip');
    } else {
      const startIdx = titlePageEl ? 1 : 0;
      if (titlePageEl) {
        await captureElement(titlePageEl.parentElement, '01.png');
      }
      for (let i = 0; i < contentPageEls.length; i++) {
        const idx = String(i + 1 + startIdx).padStart(2, '0');
        await captureElement(contentPageEls[i], `${idx}.png`);
        await new Promise(r => setTimeout(r, 300));
      }
    }
  } finally {
    btn.disabled = false; btn.textContent = '下载全部图片';
  }
}

// 防抖更新
let updateTimer = null;
function scheduleUpdate() {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(renderPreview, 300);
}

// 拖拽 .md 文件 + 图片
const editor = document.getElementById('editor');
const dropHint = document.getElementById('dropHint');

['dragenter', 'dragover'].forEach(evt => {
  editor.addEventListener(evt, e => { e.preventDefault(); dropHint.classList.add('dragover'); });
  dropHint.addEventListener(evt, e => { e.preventDefault(); dropHint.classList.add('dragover'); });
});
['dragleave', 'drop'].forEach(evt => {
  editor.addEventListener(evt, () => dropHint.classList.remove('dragover'));
  dropHint.addEventListener(evt, () => dropHint.classList.remove('dragover'));
});

function handleDrop(e) {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  let mdFile = null;
  const imgFiles = [];

  for (const file of files) {
    if (file.name.endsWith('.md') || file.name.endsWith('.txt') || file.type.startsWith('text/')) {
      mdFile = file;
    } else if (file.type.startsWith('image/')) {
      imgFiles.push(file);
    }
  }

  // 加载图片到 imageStore
  let imgLoaded = 0;
  const totalImg = imgFiles.length;
  function onAllImagesLoaded() {
    if (mdFile) {
      const reader = new FileReader();
      reader.onload = ev => { editor.value = ev.target.result; scheduleUpdate(); };
      reader.readAsText(mdFile);
    } else if (totalImg > 0) {
      scheduleUpdate();
    }
  }

  if (totalImg === 0) {
    onAllImagesLoaded();
  } else {
    for (const img of imgFiles) {
      const reader = new FileReader();
      reader.onload = ev => {
        const data = ev.target.result;
        const baseName = normalizeImageKey(img.name);
        imageStore[img.name] = data;
        imageStore[baseName] = data;
        imageStore[decodeURIComponent(baseName)] = data;
        imgLoaded++;
        if (imgLoaded >= totalImg) onAllImagesLoaded();
      };
      reader.readAsDataURL(img);
    }
  }
}
editor.addEventListener('drop', handleDrop);
dropHint.addEventListener('drop', handleDrop);

// 输入监听
editor.addEventListener('input', scheduleUpdate);

// 初始化
initStylePanel();
initTemplatePanel();
const resetBtn = document.getElementById('btnResetStyle');
if (resetBtn) resetBtn.addEventListener('click', resetToDefault);
const resetTemplateBtn = document.getElementById('btnResetTemplate');
if (resetTemplateBtn) resetTemplateBtn.addEventListener('click', resetTemplateConfig);
const exportConfigBtn = document.getElementById('btnExportConfig');
if (exportConfigBtn) exportConfigBtn.addEventListener('click', exportConfig);
renderPreview();
</script>
